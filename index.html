<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion SMP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#05010a;
color:white;
overflow:hidden;
}

/* CANVAS BG */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
nav{
position:absolute;
top:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
align-items:center;
}

nav h1{
font-weight:800;
background:linear-gradient(90deg,#c084fc,#ff4df0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav .btn{
background:linear-gradient(90deg,#a855f7,#ec4899);
padding:10px 20px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

nav .btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px #c084fc;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.tag{
margin-bottom:20px;
padding:6px 14px;
border:1px solid #a855f7;
border-radius:999px;
font-size:12px;
letter-spacing:2px;
color:#c084fc;
}

.hero h2{
font-size:4.5rem;
font-weight:800;
background:linear-gradient(#fff,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:15px;
color:#bbb;
}

.main-btn{
margin-top:30px;
padding:14px 40px;
background:linear-gradient(90deg,#a855f7,#ec4899);
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.main-btn:hover{
transform:translateY(-4px);
box-shadow:0 0 25px #a855f7;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<h1>Fusion SMP</h1>
<div class="btn" onclick="copyIP()">PLAY NOW</div>
</nav>

<div class="hero">
<div class="tag">RELEASE</div>
<h2>FUSION SMP</h2>
<p>Custom Plugin • Fusions • No Pay-To-Win</p>
<div class="main-btn" onclick="copyIP()">PLAY.FUSIONSMP.XYZ</div>
</div>

<script>

/* COPY IP */
function copyIP(){
navigator.clipboard.writeText("play.fusionsmp.xyz");
}

/* PARTICLE SYSTEM */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width) p.vx*=-1;
if(p.y<0||p.y>canvas.height) p.vy*=-1;
});

requestAnimationFrame(draw);
}

draw();

/* RESIZE */
window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
