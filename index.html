<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion SMP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #0e0e0e;
    color: white;
    overflow-x: hidden;
}

/* GLOBAL */
section {
    padding: 80px 20px;
    text-align: center;
}

h1,h2,h3 {
    margin-bottom: 15px;
}

button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    transition: 0.25s ease;
}

button:hover {
    transform: translateY(-3px);
}

button:active {
    transform: scale(0.95);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#1a1a1a,#000);
}

.hero h1 {
    font-size: 3rem;
}

.hero button {
    margin-top: 20px;
    background: #ff4da6;
    color: white;
}

/* FADE IN */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* RANKS */
.rank-container {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.rank {
    padding: 25px;
    width: 260px;
    border-radius: 12px;
    transition: 0.3s;
}

.rank:hover {
    transform: translateY(-8px);
}

.mvp {
    border: 2px solid #ffd84d;
    box-shadow: 0 0 20px rgba(255,216,77,0.3);
}

.mvp h3 {
    color: #ffd84d;
}

.mvpplus {
    border: 2px solid #ff8c42;
    box-shadow: 0 0 20px rgba(255,140,66,0.3);
}

.mvpplus h3 {
    color: #ff8c42;
}

/* POPUP */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    pointer-events: all;
}

.popup-box {
    background: #1c1c1c;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    transform: scale(0.8);
    transition: 0.3s;
}

.popup.active .popup-box {
    transform: scale(1);
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ff4da6;
    padding: 12px 20px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
}

</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#ranks">Ranks</a>
<a href="#about">About</a>
</nav>

<!-- HERO -->
<section class="hero fade">
<h1>Fusion SMP</h1>
<p>Clean SMP • No Pay to Win</p>
<button onclick="copyIP()">Copy IP</button>
</section>

<!-- ABOUT -->
<section id="about" class="fade">
<h2>About Server</h2>
<p>We are a custom coded SMP with no pay-to-win. Just pure gameplay.</p>
</section>

<!-- RANKS -->
<section id="ranks" class="fade">
<h2>Discord Ranks</h2>

<div class="rank-container">

<div class="rank mvp">
<h3>MVP</h3>
<p>Testing features</p>
<p>MVP channels</p>
<button onclick="openPopup('MVP','Access to testing + channels')">Info</button>
</div>

<div class="rank mvpplus">
<h3>MVP+</h3>
<p>Everything in MVP</p>
<p>Private calls</p>
<button onclick="openPopup('MVP+','Includes calls + priority testing')">Info</button>
</div>

</div>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">
<h2 id="pop-title"></h2>
<p id="pop-text"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast">Copied</div>

<script>

/* FADE */
const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

/* POPUP */
function openPopup(title,text){
    document.getElementById("pop-title").innerText = title;
    document.getElementById("pop-text").innerText = text;
    document.getElementById("popup").classList.add("active");
}

function closePopup(){
    document.getElementById("popup").classList.remove("active");
}

/* TOAST */
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(()=>{
        t.classList.remove("show");
    },2000);
}

/* COPY IP */
function copyIP(){
    navigator.clipboard.writeText("fusionsmp.xyz");
    showToast("IP Copied!");
}

</script>

</body>
</html>
